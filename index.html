<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新潤A18 實價登錄完整母體數據庫 (穩定修復版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-gray-900">新潤A18 實價登錄完整母體數據庫</h1>
            <p class="text-gray-500 mt-1">完整呈現 844 筆歷史登錄紀錄 (除錯穩定版)</p>
        </header>

        <div id="status-card" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 flex items-center">
            <span class="text-blue-700 font-medium" id="load-status">資料載入中...</span>
        </div>

        <div class="bg-white shadow rounded-lg p-6 mb-6 border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">📊 全社區 844 筆數據分類大數據庫</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
                    <thead class="bg-gray-50 text-gray-700 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-6 py-3">數據分類</th>
                            <th class="px-6 py-3">坪數區間與特性描述</th>
                            <th class="px-6 py-3">總登記筆數</th>
                            <th class="px-6 py-3">最高單價</th>
                            <th class="px-6 py-3">最低單價</th>
                            <th class="px-6 py-3">平均單價</th>
                            <th class="px-6 py-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="analysis-body" class="divide-y divide-gray-200 font-medium text-gray-600">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg p-6 mb-6 border border-gray-200">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">地址搜尋</label>
                    <input type="text" id="search-address" placeholder="例如：春德路、269號" 
                           class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">交易樓層</label>
                    <select id="filter-floor" class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">全部樓層</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">房型與數據分類</label>
                    <select id="filter-room" class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">全部顯示</option>
                        <option value="1房">1 房 (22坪以下)</option>
                        <option value="2房">2 房 (22~32坪)</option>
                        <option value="3房">3 房 (32坪以上)</option>
                        <option value="其他/純車位">其他 / 純車位</option>
                    </select>
                </div>

                <div class="flex items-center md:pt-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="exclude-special" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 h-4 w-4">
                        <span class="text-sm font-medium text-gray-700">排除特殊交易 (親友員工戶)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-100 rounded-lg p-3 border border-gray-200 flex justify-between items-center px-6">
                <span class="text-sm font-medium text-gray-500">當前顯示筆數 / 總原始數據</span>
                <span class="text-lg font-bold text-gray-800" id="stat-count">0 / <span id="stat-total">0</span> 筆</span>
            </div>
            <div class="bg-emerald-50 rounded-lg p-3 border border-emerald-200 flex justify-between items-center px-6">
                <span class="text-sm font-medium text-emerald-700">當前顯示均價</span>
                <span class="text-lg font-bold text-emerald-600" id="stat-avg-price">0 萬/坪</span>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
                    <thead class="bg-gray-50 text-gray-700 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-4 py-3">交易年月</th>
                            <th class="px-4 py-3">地址</th>
                            <th class="px-4 py-3">分類房型</th>
                            <th class="px-4 py-3">樓層</th>
                            <th class="px-4 py-3">每坪單價</th>
                            <th class="px-4 py-3">總價 (萬)</th>
                            <th class="px-4 py-3">房屋坪數</th>
                            <th class="px-4 py-3">車位</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
            <div id="no-data" class="hidden text-center py-12 text-gray-500">
                沒有符合篩選條件的交易資料。
            </div>
        </div>
    </div>

    <script>
        let allTransactions = [];

        // 改良路徑獲取邏輯，相容 file:// 與 http://
        function getBaseUrl() {
            const href = window.location.href;
            if (href.startsWith('file://')) {
                return "./"; // 本地端直接雙擊打開，使用相對路徑
            }
            return href.substring(0, href.lastIndexOf('/') + 1);
        }

        function judgeRoomType(item) {
            const area = item.house_area_ping || (item.total_area_ping - (item.parking_area_ping || 0));
            if (!area || area <= 0 || !item.total_price) {
                return "其他/純車位";
            }
            if (area < 22) return "1房";
            if (area >= 22 && area < 32) return "2房";
            return "3房";
        }

        async function loadAllData() {
            const fileCount = 9;
            const fetchPromises = [];
            const baseUrl = getBaseUrl();

            for (let i = 1; i <= fileCount; i++) {
                const url = baseUrl.startsWith('./') ? `新潤${i}.json` : `${baseUrl}新潤${i}.json`;
                fetchPromises.push(
                    fetch(url)
                        .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                        .then(json => json.data || [])
                        .catch(() => [])
                );
            }

            try {
                const results = await Promise.all(fetchPromises);
                allTransactions = results.flat();
                
                allTransactions.forEach(item => {
                    item._roomType = judgeRoomType(item);
                });

                allTransactions.sort((a, b) => (b.transaction_date || '').localeCompare(a.transaction_date || ''));

                document.getElementById('load-status').innerText = `成功載入共 ${allTransactions.length} 筆完整數據！`;
                document.getElementById('status-card').className = "bg-emerald-50 border border-emerald-200 rounded-lg p-4 mb-6 flex items-center text-emerald-700";
                
                calculateAnalysisTable();
                initFloorDropdown();
                renderData(allTransactions); 
            } catch (error) {
                console.error(error);
                document.getElementById('load-status').innerText = "大數據庫載入失敗。";
                document.getElementById('status-card').className = "bg-red-50 border border-red-200 rounded-lg p-4 mb-6 flex items-center text-red-700";
            }
        }

        function calculateAnalysisTable() {
            const categories = [
                { name: "1房", desc: "22 坪以下主要房型" },
                { name: "2房", desc: "22 坪 (含) ~ 32 坪主流配比" },
                { name: "3房", desc: "32 坪 (含) 以上大格局" },
                { name: "其他/純車位", desc: "純車位交易 / 特殊登記" }
            ];

            const tbody = document.getElementById('analysis-body');
            tbody.innerHTML = '';

            categories.forEach(cat => {
                const allInCat = allTransactions.filter(item => item._roomType === cat.name);
                const count = allInCat.length;

                const validTxs = allInCat.filter(item => item.is_special_trade !== 1 && item.unit_price_ping > 0);
                const prices = validTxs.map(item => item.unit_price_ping);
                
                const max = prices.length > 0 ? Math.max(...prices) : 0;
                const min = prices.length > 0 ? Math.min(...prices) : 0;
                const avg = prices.length > 0 ? (prices.reduce((sum, p) => sum + p, 0) / prices.length).toFixed(2) : 0;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="px-6 py-3 font-bold text-gray-900">${cat.name}</td>
                    <td class="px-6 py-3 text-gray-500 text-xs">${cat.desc}</td>
                    <td class="px-6 py-3 font-semibold text-blue-600">${count} 筆</td>
                    <td class="px-6 py-3 text-red-600">${max ? max + ' 萬' : '-'}</td>
                    <td class="px-6 py-3 text-gray-400">${min ? min + ' 萬' : '-'}</td>
                    <td class="px-6 py-3 text-emerald-600 font-bold">${avg ? avg + ' 萬/坪' : '-'}</td>
                    <td class="px-6 py-2">
                        <button onclick="quickFilterRoom('${cat.name}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-3 py-1 rounded text-xs font-semibold transition-colors border border-blue-200">
                            快速篩選
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function quickFilterRoom(roomName) {
            document.getElementById('filter-room').value = roomName;
            filterAndRender();
        }

        function initFloorDropdown() {
            const floorSelect = document.getElementById('filter-floor');
            floorSelect.innerHTML = '<option value="">全部樓層</option>'; // 清空重置
            
            // 嚴格抽取出有效的樓層號碼
            const floors = [...new Set(allTransactions.map(item => {
                return (item.floor && Array.isArray(item.floor) && item.floor.length > 0) ? item.floor[0] : null;
            }).filter(Boolean))];
            
            floors.sort((a, b) => Number(a) - Number(b));
            
            floors.forEach(floor => {
                const opt = document.createElement('option');
                opt.value = floor.toString(); // 強制轉成字串對齊
                opt.innerText = `${floor} 樓`;
                floorSelect.appendChild(opt);
            });
        }

        function filterAndRender() {
            try {
                const searchAddress = document.getElementById('search-address').value.trim().toLowerCase();
                const selectedFloor = document.getElementById('filter-floor').value.toString(); // 確保是字串
                const selectedRoom = document.getElementById('filter-room').value;
                const excludeSpecial = document.getElementById('exclude-special').checked;

                const filtered = allTransactions.filter(item => {
                    const matchAddress = !searchAddress || 
                        (item.address && item.address.toLowerCase().includes(searchAddress)) ||
                        (item.object_title && item.object_title.toLowerCase().includes(searchAddress));

                    // 改良後的嚴格樓層比對邏輯 (轉字串防止弱型態判斷死掉)
                    let matchFloor = true;
                    if (selectedFloor !== "") {
                        const itemFloor = (item.floor && Array.isArray(item.floor) && item.floor.length > 0) ? item.floor[0].toString() : "";
                        matchFloor = (itemFloor === selectedFloor);
                    }

                    const matchRoom = !selectedRoom || item._roomType === selectedRoom;
                    const matchSpecial = !excludeSpecial || item.is_special_trade !== 1;

                    return matchAddress && matchFloor && matchRoom && matchSpecial;
                });

                renderData(filtered);
            } catch (err) {
                console.error("篩選運行時錯誤:", err);
            }
        }

        function renderData(data) {
            const tbody = document.getElementById('table-body');
            const noData = document.getElementById('no-data');
            tbody.innerHTML = '';

            document.getElementById('stat-total').innerText = allTransactions.length;
            document.getElementById('stat-count').innerText = data.length;

            if (!data || data.length === 0) {
                noData.classList.remove('hidden');
                document.getElementById('stat-avg-price').innerText = '0 萬/坪';
                return;
            } else {
                noData.classList.add('hidden');
            }

            let totalUnitSum = 0;
            let validUnitCount = 0;

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors text-gray-700";

                const isSpecial = item.is_special_trade === 1;
                const addressHTML = isSpecial 
                    ? `<div>${item.address || '特殊申報'} <span class="bg-red-100 text-red-700 text-xs px-1 rounded ml-1">親友</span></div>`
                    : `<div>${item.address || item.object_title || '無特定地址'}</div>`;

                const parkingType = item.parking_type && item.parking_type[0] ? item.parking_type[0] : '無車位';
                const parkingPrice = item.total_parking_price ? `${item.total_parking_price}萬` : '';
                const parkingHTML = `<div>${parkingType}</div><div class="text-xs text-gray-400">${parkingPrice}</div>`;

                let roomBadgeColor = "bg-gray-100 text-gray-600";
                if(item._roomType === "1房") roomBadgeColor = "bg-purple-100 text-purple-700";
                if(item._roomType === "2房") roomBadgeColor = "bg-blue-100 text-blue-700";
                if(item._roomType === "3房") roomBadgeColor = "bg-amber-100 text-amber-700";
                if(item._roomType === "其他/純車位") roomBadgeColor = "bg-red-50 text-red-500 border border-red-100";

                if (item.unit_price_ping > 0) {
                    totalUnitSum += item.unit_price_ping;
                    validUnitCount++;
                }

                const houseArea = item.house_area_ping || item.total_area_ping || 0;
                const displayFloor = (item.floor && item.floor.length > 0) ? `${item.floor[0]}F` : '-';

                tr.innerHTML = `
                    <td class="px-4 py-3 font-medium text-gray-500">${item.transaction_date || '未知'}</td>
                    <td class="px-4 py-3">${addressHTML}<div class="text-xs text-gray-400">${item.object_title || ''}</div></td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 rounded text-xs font-bold ${roomBadgeColor}">${item._roomType}</span></td>
                    <td class="px-4 py-3">${displayFloor} / ${item.total_floor || '-'}F</td>
                    <td class="px-4 py-3 font-bold text-gray-900">${item.unit_price_ping ? item.unit_price_ping + ' 萬' : '-'}</td>
                    <td class="px-4 py-3 font-semibold text-blue-600">${item.total_price || '-'} 萬</td>
                    <td class="px-4 py-3 font-medium">${houseArea ? houseArea + ' 坪' : '0 坪'}</td>
                    <td class="px-4 py-3 text-xs">${parkingHTML}</td>
                `;
                tbody.appendChild(tr);
            });

            const avgUnitPrice = validUnitCount > 0 ? (totalUnitSum / validUnitCount).toFixed(2) : 0;
            document.getElementById('stat-avg-price').innerText = `${avgUnitPrice} 萬/坪`;
        }

        document.getElementById('search-address').addEventListener('input', filterAndRender);
        document.getElementById('filter-floor').addEventListener('change', filterAndRender);
        document.getElementById('filter-room').addEventListener('change', filterAndRender);
        document.getElementById('exclude-special').addEventListener('change', filterAndRender);

        window.onload = loadAllData;
    </script>
</body>
</html>
